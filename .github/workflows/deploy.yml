name: Frontend Serve

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Log in to Docker Hub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Step 3: Build the Docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest .

      # Step 4: Push the Docker image to Docker Hub
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest

      # Step 5: Deploy on AWS EC2 via SSH
      - name: Deploy on AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_SSH_HOST }}
          username: ${{ secrets.AWS_SSH_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            set -e  # Stop on errors
            echo "Logging into AWS EC2..."

            # Navigate to deployment directory
            cd briqFace

            # Stop and remove the old container
            docker stop briqpilot-frontend_frontend_1 || true
            docker rm briqpilot-frontend_frontend_1 || true

            # Clean up unused Docker resources | Aggressive cleanup
            echo "Cleaning up unused Docker resources..."
            docker system prune -a -f

            # Pull the latest image from Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest

            # Run the updated container
            docker run -d --name briqpilot-frontend_frontend_1 \
              -p 5173:5173 \
              --env-file ./.env \
              ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest

            echo "Deployment Complete!"
