name: Paris Ops

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Ensures latest updates are fetched

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Force Build Docker image (No Cache)
        run: |
          docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/briqfrontend:latest .

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/briqfrontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Install SSHpass
        run: sudo apt-get install -y sshpass

      - name: Deploy to DigitalOcean Droplet
        run: |
          sshpass -p "${{ secrets.DROPLET_PASSWORD }}" ssh -o StrictHostKeyChecking=no ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'EOF'
            cd ~/briqFrontend
            docker-compose pull frontend
            docker-compose up -d --no-deps --force-recreate frontend
            docker image prune -f
          EOF
