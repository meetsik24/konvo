name: BriqPilot Frontend Test

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest .

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest

      - name: Deploy on AWS EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_SSH_HOST }}
          username: ${{ secrets.AWS_SSH_USER }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Deploying briqpilot-fe-test..."

            # Stop and remove old container if exists
            docker stop briqpilot-fe-test || true
            docker rm briqpilot-fe-test || true

            # Pull latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest

            # Run new container on port 5174
            docker run -d \
              --name briqpilot-fe-test \
              -p 5174:5173 \
              --env-file ~/briqFace/.env \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/briqpilot-frontend:latest

            echo "Deployment Complete!"
